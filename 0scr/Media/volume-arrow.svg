<svg xmlns="http://www.w3.org/2000/svg" width="11" height="66" shape-rendering="crispEdges" viewBox="0 0 11 66">
  <!-- Row 0: WWWWWWWWWW + dark edge -->
  <rect x="0" y="0" width="10" height="1" fill="#ffffff"/>
  <rect x="10" y="0" width="1" height="1" fill="#828282"/>

  <!-- Rows 1-5: W + gray fill + dark edge (left starts at 0) -->
  <rect x="0" y="1" width="1" height="5" fill="#ffffff"/>
  <rect x="1" y="1" width="9" height="5" fill="#c3c3c3"/>
  <rect x="10" y="1" width="1" height="5" fill="#828282"/>

  <!-- Rows 6-11: left steps in 1px, W + gray + dark -->
  <rect x="1" y="6" width="1" height="6" fill="#ffffff"/>
  <rect x="2" y="6" width="8" height="6" fill="#c3c3c3"/>
  <rect x="10" y="6" width="1" height="6" fill="#828282"/>

  <!-- Rows 12-17 -->
  <rect x="2" y="12" width="1" height="6" fill="#ffffff"/>
  <rect x="3" y="12" width="7" height="6" fill="#c3c3c3"/>
  <rect x="10" y="12" width="1" height="6" fill="#828282"/>

  <!-- Rows 18-23 -->
  <rect x="3" y="18" width="1" height="6" fill="#ffffff"/>
  <rect x="4" y="18" width="6" height="6" fill="#c3c3c3"/>
  <rect x="10" y="18" width="1" height="6" fill="#828282"/>

  <!-- Rows 24-29 -->
  <rect x="4" y="24" width="1" height="6" fill="#ffffff"/>
  <rect x="5" y="24" width="5" height="6" fill="#c3c3c3"/>
  <rect x="10" y="24" width="1" height="6" fill="#828282"/>

  <!-- Rows 30-35 -->
  <rect x="5" y="30" width="1" height="6" fill="#ffffff"/>
  <rect x="6" y="30" width="4" height="6" fill="#c3c3c3"/>
  <rect x="10" y="30" width="1" height="6" fill="#828282"/>

  <!-- Rows 36-41 -->
  <rect x="6" y="36" width="1" height="6" fill="#ffffff"/>
  <rect x="7" y="36" width="3" height="6" fill="#c3c3c3"/>
  <rect x="10" y="36" width="1" height="6" fill="#828282"/>

  <!-- Rows 42-47 -->
  <rect x="7" y="42" width="1" height="6" fill="#ffffff"/>
  <rect x="8" y="42" width="2" height="6" fill="#c3c3c3"/>
  <rect x="10" y="42" width="1" height="6" fill="#828282"/>

  <!-- Rows 48-53 -->
  <rect x="8" y="48" width="1" height="6" fill="#ffffff"/>
  <rect x="9" y="48" width="1" height="6" fill="#c3c3c3"/>
  <rect x="10" y="48" width="1" height="6" fill="#828282"/>

  <!-- Rows 54-59: just W + dark -->
  <rect x="9" y="54" width="1" height="6" fill="#ffffff"/>
  <rect x="10" y="54" width="1" height="6" fill="#828282"/>

  <!-- Rows 60-64: just dark edge -->
  <rect x="10" y="60" width="1" height="5" fill="#828282"/>

  <!-- Row 65: single white pixel at tip -->
  <rect x="10" y="65" width="1" height="1" fill="#ffffff"/>
</svg>
